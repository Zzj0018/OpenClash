# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

# ========================
# 策略组定义
# ========================
default: &default
  type: select
  proxies:
    - 香港-代理
    - 香港-专线
    - 美国-代理
    - 美国-专线
    - 香港-故转
    - 香港-自动
    - 台湾-故转
    - 台湾-自动
    - 新加坡-故转
    - 新加坡-自动
    - 美国-故转
    - 美国-自动
    - 香港-myTV
    - 直连
    - 拒绝

proxy-groups:

  # 业务分流组

  - {name: AI, <<: *default}
  - {name: Gemini, <<: *default}
  - {name: myTV, <<: *default}
  - {name: Youtube, <<: *default}
  - {name: TikTok, <<: *default}
  - {name: Netflix, <<: *default}
  - {name: HBO max, <<: *default}
  - {name: Disney+, <<: *default}
  - {name: TUBI, <<: *default}
  - {name: Plex, <<: *default}
  - {name: GitHub, <<: *default}
  - {name: Reddit, <<: *default}  
  - {name: Nvidia, <<: *default}
  - {name: Google, <<: *default}
  - {name: Telegram, <<: *default}
  - {name: Amazon, <<: *default}
  - {name: Apple, <<: *default}
  - {name: Spotify, <<: *default}
  - {name: Microsoft, <<: *default}
  - {name: Games, <<: *default}
  - {name: Crypto, <<: *default}
  - {name: Test, <<: *default}
  - {name: Block, <<: *default}
  - {name: 国外, <<: *default}
  - {name: 国内, <<: *default}
  - {name: 非标端口, <<: *default}
  - {name: 漏网之鱼, <<: *default}  
  
  #链式代理，
  - name: 香港-代理
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 香港-专线
      - 香港-故转 
  - name: 香港-专线
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 香港-专1
      - 香港-专2
  - name: 香港-专1
    type: select
    include-all: true
    filter: "(?=.*(AS|7280ce55))^((?!(台|香|日|韩|新|深|美)).)*$" 
  - name: 香港-专2
    type: select
    include-all: true
    filter: "(?=.*(AS|7280ce55))^((?!(台|香|日|韩|新|深|美)).)*$" 
    
  - name: 美国-代理
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 美国-专线
      - 美国-故转  
  - name: 美国-专线
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 美国-专1
      - 美国-专2
  - name: 美国-专1
    type: select
    include-all: true
    filter: "(?=.*(QA|6ff2ac18))^((?!(台|香|日|韩|新|深|美)).)*$"
  - name: 美国-专2
    type: select
    include-all: true
    filter: "(?=.*(QA|6ff2ac18))^((?!(台|香|日|韩|新|深|美)).)*$"
    
  # 香港组
  
  - name: 香港-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 香港-手选
      - 香港-自动   
  - name: 香港-手选
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 香港-手选A
      - 香港-手选B
  - name: 香港-手选A
    type: select
    include-all: true
    filter: "(?=.*(香港|🇭🇰|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|印度|住宅)).)*$"  
  - name: 香港-手选B
    type: select
    include-all: true
    filter: "(?=.*(香港|🇭🇰|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|印度|住宅)).)*$"   
  - name: 香港-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    filter: "(?=.*(香港|🇭🇰|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|印度|良心云|住宅)).)*$"
  
# myTV
    
  - name: 香港-myTV
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 香港-TVB
      - 香港-TVB自动
  - name: 香港-TVB
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 香港-TVB1
      - 香港-TVB2
  - name: 香港-TVB1
    type: select
    include-all: true
    filter: "(?=.*(香港|🇭🇰|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|良心云|印度|住宅)).)*$"
  - name: 香港-TVB2
    type: select
    include-all: true
    filter: "(?=.*(香港|🇭🇰|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|良心云|印度|住宅)).)*$"
  - name: 香港-TVB自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    filter: "(?=.*(🇭🇰|香港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|印度|良心云|住宅)).)*$"
 
  # 台湾组

  - name: 台湾-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 台湾-手选
      - 台湾-自动  
  - name: 台湾-手选
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 台湾-手选A
      - 台湾-手选B
  - name: 台湾-手选A
    type: select
    include-all: true
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
  - name: 台湾-手选B
    type: select
    include-all: true
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
  - name: 台湾-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"

  # 新加坡组

  - name: 新加坡-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 新加坡-手选
      - 新加坡-自动
      
  - name: 新加坡-手选
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 新加坡-手选A
      - 新加坡-手选B
  - name: 新加坡-手选A
    type: select
    include-all: true
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
  - name: 新加坡-手选B
    type: select
    include-all: true
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
  - name: 新加坡-自动
    url: http://www.gstatic.com/generate_204
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore))^((?!(台|日|港|韩|深|美)).)*$"

  # 美国组

  - name: 美国-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 美国-手选
      - 美国-自动
  - name: 美国-手选
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 美国-手选1
      - 美国-手选2
  - name: 美国-手选1
    type: select
    include-all: true
    filter: "(?=.*(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"
  - name: 美国-手选2
    type: select
    include-all: true
    filter: "(?=.*(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"
  - name: 美国-自动
    url: http://www.gstatic.com/generate_204
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    filter: "(?=.*(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"

