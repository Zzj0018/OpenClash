# ========================
# Clash-ALL 优化配置
# ========================

# 机场节点订阅

proxy-providers:
    
  Lz:
    url: "https://dc2.cc.cd:3002/Lz18/download/collection/Lz"
    type: http
    interval: 86400
    override:
      skip-cert-verify: true
      udp: true
    health-check:
      enable: true   
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连
    
proxies:
    
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ========================
# 主要端口设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
# external-ui: ui
# external-ui-name: zashboard
# external-ui-url: https://gh-proxy.com/GitHub.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip
secret: "123456"

# ========================
# DNS 设置
# ========================
